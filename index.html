  <style>
    .pickwrap { max-width: 560px; margin: 22px auto; padding: 0 16px; }
    .pickcard { background: var(--paper); border: 1px solid var(--line); border-radius: 24px; padding: 22px; position: relative; }
    .pick-t { font-family:'Anton',sans-serif; font-size:20px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
    .pick-s { font-size:13px; color:var(--mut); margin-bottom:16px; }
    .pick-in { width:100%; font-size:16px; padding:14px 16px; border:1.5px solid var(--line); border-radius:16px; font-family:'Noto Sans',sans-serif; outline:none; background:var(--paper2); }
    .pick-in:focus { border-color:var(--ink); }
    .pick-hint { font-size:11px; color:var(--mut); margin-top:9px; }
    .pred-grid { display:grid; gap:9px; }
    .pred-row { display:flex; align-items:center; gap:12px; background:var(--paper2); border:1px solid var(--line); border-radius:14px; padding:11px 14px; }
    .pred-ic { width:30px; text-align:center; font-size:18px; flex-shrink:0; }
    .pred-lbl { font-size:11px; font-weight:800; letter-spacing:0.4px; text-transform:uppercase; color:var(--mut); flex:1; }
    .pred-val { font-family:'Anton',sans-serif; font-size:16px; letter-spacing:0.3px; text-align:right; }
    .pred-h { font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--mut); margin:14px 0 8px; }
    .hero-insight { position:relative; z-index:1; color:#EDEDE8; font-size:13px; line-height:1.55; margin-top:13px; max-width:62%; }
    .hero-insight strong { color:#fff; font-weight:800; }
    @media (max-width:560px){ .hero-insight { max-width:100%; } }
    a.sb-team { text-decoration:none; color:inherit; cursor:pointer; }
    a.sb-team:hover .sb-name { color:var(--yel); }
    .m-fm { font-size:10px; font-weight:800; letter-spacing:0.3px; text-transform:uppercase; color:#00935a; text-decoration:none; border:1px solid #00935a; padding:4px 10px; border-radius:20px; white-space:nowrap; }
    .m-fm:hover { background:#00935a; color:#fff; }
    .sb2 { position:relative; overflow:hidden; background:var(--ink); border-radius:18px; margin-bottom:13px; }

    .sb2 > * { position:relative; z-index:1; }
    .sb-row { display:grid; grid-template-columns:1fr 1fr 1fr; align-items:center; gap:8px; padding:16px 6px 12px; }
    .sb-mid { text-align:center; }
    .sb-time { font-family:'Anton',sans-serif; font-size:21px; color:#fff; line-height:1; }
    .sb-date { font-size:10px; font-weight:800; letter-spacing:0.5px; color:var(--yel); margin-top:5px; }
    .sb-fifa { font-size:10px; font-weight:700; color:#C9C9C2; }
    .sb-odds { display:grid; grid-template-columns:1fr 1fr 1fr; text-align:center; }
    .sb-odds > div { padding:6px 4px 13px; display:flex; flex-direction:column; align-items:center; gap:3px; }
    .o-pct { font-family:'Anton',sans-serif; font-size:17px; }
    .o-lbl { font-size:9px; font-weight:800; letter-spacing:0.3px; text-transform:uppercase; color:#9A9A93; }
    .m-meta2 { display:flex; align-items:center; gap:8px; margin-bottom:13px; }
    .m-meta2 .m-grp { font-size:10px; font-weight:800; letter-spacing:0.5px; text-transform:uppercase; color:var(--mut); }
    .tag2 { display:block; font-size:10px; font-weight:800; letter-spacing:0.5px; text-transform:uppercase; color:var(--mut); margin-bottom:6px; }
    .pickv { display:block; font-family:'Anton',sans-serif; font-size:16px; letter-spacing:0.3px; color:var(--ink); line-height:1.1; }
    .sub2 { display:block; font-size:12px; font-weight:600; color:var(--mut); margin-top:5px; }
    .stake-banner { position:relative; overflow:hidden; background:#1b2a36; border-radius:22px; padding:28px 16px; text-align:center; }
    .stake-banner::before { content:""; position:absolute; left:50%; top:50%; width:220%; height:220%; transform:translate(-50%,-50%); background:repeating-conic-gradient(from 0deg at 50% 50%, rgba(255,255,255,0.11) 0deg 0.55deg, transparent 0.55deg 6deg); }
    .stake-word { position:relative; font-family:'Pacifico', cursive; font-size:42px; color:#fff; line-height:1; text-shadow:0 2px 12px rgba(0,0,0,0.45); }
    .stake-sub { position:relative; display:block; margin-top:9px; font-family:'Anton', sans-serif; font-size:11px; letter-spacing:3px; color:#9fb3c8; text-transform:uppercase; }
    .fr-row.me { background:var(--yel); }
    .fr-row { cursor:pointer; }
    .fr-row:hover { background:var(--paper2); }
    .fr-row.me:hover { background:var(--yel); }
    .podium-wrap { margin:0 0 14px; }
    .podium-t { font-size:11px; font-weight:800; letter-spacing:0.5px; text-transform:uppercase; color:var(--mut); margin-bottom:8px; }
    .podium { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
    .pod { background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:12px 6px; text-align:center; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; }
    .pod:hover { border-color:var(--ink); }
    .pod-pos { font-family:'Anton',sans-serif; font-size:15px; }
    .pod-1 .pod-pos { color:#C99700; } .pod-2 .pod-pos { color:#9AA0A6; } .pod-3 .pod-pos { color:#C97B30; }
    .pod-name { font-size:12px; font-weight:700; line-height:1.15; }
    .pod-pts { font-family:'Anton',sans-serif; font-size:18px; color:var(--ink); }
    .tabs { position:sticky; top:0; z-index:30; display:flex; gap:8px; overflow-x:auto; background:var(--ink); padding:11px 14px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .tabs::-webkit-scrollbar { display:none; }
    .tab { flex:0 0 auto; display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.10); color:#EDEDE8; border:none; font-family:'Anton',sans-serif; font-size:13px; letter-spacing:0.4px; text-transform:uppercase; padding:9px 15px; border-radius:22px; cursor:pointer; white-space:nowrap; }
    .tab:hover { background:rgba(255,255,255,0.20); }
    .tab.active { background:#fff; color:var(--ink); }
    .soon { font-size:9px; font-weight:800; letter-spacing:0.4px; text-transform:uppercase; color:#fff; background:var(--red); padding:2px 6px; border-radius:20px; }
    .eq-list { display:flex; flex-direction:column; }
    .eq-row { display:flex; align-items:center; gap:10px; padding:11px 4px; border-bottom:1px solid var(--line); text-decoration:none; color:inherit; }
    .eq-row:hover { background:var(--paper2); }
    .eq-name { font-size:14px; font-weight:700; }
    .eq-fifa { font-size:11px; color:var(--mut); }
    .eq-go { margin-left:auto; font-size:10px; font-weight:800; letter-spacing:0.3px; text-transform:uppercase; color:#00935a; }
    .pg-cards2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    @media (max-width:520px){ .pg-cards2 { grid-template-columns:1fr; } }
    .rgt { width:100%; border-collapse:collapse; font-size:13px; }
    .rgt th,.rgt td { border:1px solid var(--line); padding:8px 6px; text-align:center; }
    .rgt th { background:var(--paper2); font-size:11px; text-transform:uppercase; letter-spacing:0.3px; }
    .rgt td:first-child,.rgt th:first-child { text-align:left; font-weight:700; }
    .sb-res { font-family:'Anton',sans-serif; font-size:24px; color:#fff; line-height:1; letter-spacing:1px; }
    .pg-row { display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid var(--line); }
    .pg-rk { font-family:'Anton',sans-serif; font-size:15px; color:var(--mut); width:22px; text-align:center; flex-shrink:0; }
    .pg-main { flex:1; min-width:0; }
    .pg-name { font-size:14px; font-weight:700; margin-bottom:5px; display:flex; align-items:center; gap:6px; }
    .pg-track { height:9px; background:var(--paper2); border:1px solid var(--line); border-radius:20px; overflow:hidden; }
    .pg-bar { height:100%; background:var(--ink); border-radius:20px; }
    .pg-meta { text-align:right; flex-shrink:0; }
    .pg-pc { display:block; font-family:'Anton',sans-serif; font-size:15px; }
    .pg-c { display:block; font-size:11px; color:var(--mut); }
    .pg-cards { display:grid; grid-template-columns:1fr; gap:10px; }
    .pg-card { background:var(--paper2); border:1px solid var(--line); border-radius:14px; padding:14px; }

    .mv-btn { background:var(--ink); color:#fff; border:none; border-radius:12px; padding:12px 18px; font-family:'Anton',sans-serif; font-size:13px; letter-spacing:0.5px; cursor:pointer; }
    @media (max-width:560px){ .rg-cards { grid-template-columns:1fr; } }
    .topbar { display:flex; justify-content:center; align-items:center; }
    .tb-q { font-family:'Anton',sans-serif; font-size:22px; letter-spacing:1.5px; text-transform:uppercase; color:var(--yel); }
    .tabs { justify-content:center; }
    .flr { width:24px; height:24px; border-radius:50%; object-fit:cover; flex-shrink:0; box-shadow:0 0 0 1px rgba(0,0,0,0.10); vertical-align:middle; }
    .eqt { display:flex; flex-direction:column; }
    .eqt-h, .eqt-row { display:grid; grid-template-columns:28px 28px 1fr auto auto; align-items:center; gap:10px; padding:10px 4px; }
    .eqt-h { font-size:10px; font-weight:800; letter-spacing:0.4px; text-transform:uppercase; color:var(--mut); border-bottom:2px solid var(--line); }
    .eqt-row { border-bottom:1px solid var(--line); text-decoration:none; color:inherit; }
    .eqt-row:hover { background:var(--paper2); }

    .eqt-name { font-size:14px; font-weight:700; }
    .eqt-fifa { font-size:11px; color:var(--mut); white-space:nowrap; }
    .eqt-go { font-size:10px; font-weight:800; letter-spacing:0.3px; text-transform:uppercase; color:#00935a; white-space:nowrap; }
    .pl-link { text-decoration:none; color:inherit; cursor:pointer; }
    .pl-link:hover { text-decoration:underline; }
    .pl-row:hover { background:transparent; }
    .rg-intro { font-size:14px; line-height:1.55; }
    .livebadge { display:inline-block; background:var(--red); color:#fff; font-size:9px; font-weight:800; letter-spacing:0.5px; padding:2px 7px; border-radius:20px; vertical-align:middle; margin-left:6px; }
    .mp-btn { width:100%; margin-top:11px; background:var(--ink); border:none; border-radius:12px; padding:13px; font-family:'Anton',sans-serif; font-size:14px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; color:#fff; }
    .mp-btn:hover { background:#000; }
    .mp-panel { margin-top:10px; max-height:320px; overflow-y:auto; border:1px solid var(--line); border-radius:12px; padding:12px; background:var(--paper2); }
    .mp-panel[hidden] { display:none; }
    .mp-tot { font-size:10px; font-weight:800; letter-spacing:0.4px; text-transform:uppercase; color:var(--mut); margin-bottom:9px; }
    .mp-group { margin-bottom:11px; }
    .mp-gh { font-family:'Anton',sans-serif; font-size:13px; letter-spacing:0.3px; display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .mp-n { margin-left:auto; background:var(--ink); color:#fff; font-family:'Noto Sans',sans-serif; font-size:10px; font-weight:800; padding:2px 8px; border-radius:20px; }
    .mp-names { font-size:11px; color:var(--mut); line-height:1.55; }
    .rkp { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px; }
    .rkp-c { border-radius:16px; padding:14px 8px; text-align:center; cursor:pointer; color:#fff; }
    .rkp-c:hover { transform:translateY(-2px); }
    .rkp-1 { background:linear-gradient(160deg,#D4AC0D,#9C7A00); } .rkp-2 { background:linear-gradient(160deg,#9AA0A6,#6E747A); } .rkp-3 { background:linear-gradient(160deg,#C97B30,#8E531B); }
    .rkp-m { font-size:24px; line-height:1; } .rkp-pos { font-family:'Anton',sans-serif; font-size:13px; opacity:0.9; margin-top:2px; }
    .rkp-name { font-size:12px; font-weight:800; margin:5px 0 3px; line-height:1.15; } .rkp-pts { font-family:'Anton',sans-serif; font-size:22px; }
    .rk-search { width:100%; font-size:14px; padding:11px 14px; border:1.5px solid var(--line); border-radius:12px; margin-bottom:10px; background:var(--paper2); outline:none; font-family:'Noto Sans',sans-serif; }
    .rk-search:focus { border-color:var(--ink); }
    .rk-list { border:1.5px solid var(--line); border-radius:14px; max-height:620px; overflow-y:auto; }
    .rk-row { display:flex; align-items:center; gap:12px; padding:11px 14px; border-bottom:1px solid var(--line); cursor:pointer; }
    .rk-row:last-child { border-bottom:none; }
    .rk-row:hover { background:var(--paper2); }
    .rk-row.me { background:var(--yel); }
    .rk-pos { font-family:'Anton',sans-serif; font-size:15px; color:var(--mut); width:44px; text-align:right; flex-shrink:0; }
    .rk-row.me .rk-pos { color:var(--ink); }
    .rk-name { flex:1; font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rk-row.me .rk-name { font-weight:800; }
    .rk-pts { font-family:'Anton',sans-serif; font-size:17px; flex-shrink:0; }
    .pick-results { margin-top:9px; border:1.5px solid var(--line); border-radius:14px; overflow:hidden; max-height:340px; overflow-y:auto; }
    .pick-results[hidden] { display:none; }
    .pr-item { display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid var(--line); cursor:pointer; }
    .pr-item:last-child { border-bottom:none; }
    .pr-item:hover { background:var(--paper2); }
    .pr-name { flex:1; font-size:14px; font-weight:700; }
    .pr-pos { font-family:'Anton',sans-serif; font-size:13px; color:var(--mut); }
    .pr-empty { padding:14px; font-size:13px; color:var(--mut); text-align:center; }
  </style>
</head>
<body>
  <div class="topbar"><span class="tb-q">Quiniela</span></div>
  <div class="strip"><i style="background:var(--red)"></i><i style="background:var(--pur)"></i><i style="background:var(--blu)"></i><i style="background:var(--grn)"></i><i style="background:var(--tea)"></i><i style="background:var(--yel)"></i><i style="background:var(--pnk)"></i></div>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-v="quiniela">🏆 Mi Quiniela</button>
    <button class="tab" data-v="ranking">🏅 Ranking</button>
    <button class="tab" data-v="pronosticos">📊 Pronósticos</button>
    <button class="tab" data-v="equipos">🌍 Equipos</button>
    <button class="tab" data-v="partidos">📅 Partidos<span class="soon">Pronto</span></button>
    <button class="tab" data-v="reglas">📖 Reglas<span class="soon">Pronto</span></button>
    <button class="tab" data-v="mundial">⚽ Mundial<span class="soon">Pronto</span></button>
  </nav>

  <div class="pickwrap" id="pickwrap">
    <div class="pickcard">
      <div class="pick-t">Tu quiniela</div>
      <div class="pick-s">Busca tu nombre para ver tu reporte: tus picks vs el grupo, combinadas y tu puesto.</div>
      <input class="pick-in" id="search" placeholder="🔎 Escribe tu nombre…" autocomplete="off">
      <div class="pick-results" id="pickResults" hidden></div>
      <div class="pick-hint" id="hint">Cargando participantes…</div>
    </div>
  </div>

  <div class="wrap"><div id="app"></div></div>

  <div class="ft">
    <div id="ftlogo"><img class="ft-emblem" src="logo.png" alt="" onerror="this.style.display='none'"></div>
    <div class="ft-strip"><i style="background:var(--red)"></i><i style="background:var(--blu)"></i><i style="background:var(--grn)"></i><i style="background:var(--yel)"></i><i style="background:var(--pnk)"></i></div>
    <div class="ft-txt" id="ftgen">Generado por Saúl Bretto</div>
  </div>

  <script>
  let DATA=null, OI={}, LOGO='logo.png', VIEW='quiniela', CUR=null;
  const $=s=>document.querySelector(s);
  const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const flag=c=>`<img class="cflag" src="https://flagcdn.com/w80/${c}.png" alt="">`;
  const flagS=c=>`<img class="fl" src="https://flagcdn.com/h24/${c}.png" alt="">`;
  const flagR=c=>`<img class="flr" src="https://flagcdn.com/w80/${c}.png" alt="">`;
  const short=s=>String(s).split(' ')[0];
  const FOTMOB={mx:{id:6710,slug:'mexico',fifa:14},kr:{id:7804,slug:'south-korea',fifa:25},cz:{id:8496,slug:'czechia',fifa:40},za:{id:6316,slug:'south-africa',fifa:60},ch:{id:6717,slug:'switzerland',fifa:19},ca:{id:5810,slug:'canada',fifa:30},qa:{id:5902,slug:'qatar',fifa:56},ba:{id:10106,slug:'bosnia-herzegovina',fifa:64},'gb-sct':{id:8498,slug:'scotland',fifa:42},ma:{id:6262,slug:'morocco',fifa:7},br:{id:8256,slug:'brazil',fifa:6},ht:{id:5934,slug:'haiti',fifa:83},us:{id:6713,slug:'usa',fifa:17},au:{id:6716,slug:'australia',fifa:27},tr:{id:6595,slug:'turkiye',fifa:22},py:{id:6724,slug:'paraguay',fifa:41},de:{id:8570,slug:'germany',fifa:10},ci:{id:6709,slug:'ivory-coast',fifa:33},ec:{id:6707,slug:'ecuador',fifa:23},cw:{id:287981,slug:'curacao',fifa:82},jp:{id:6715,slug:'japan',fifa:18},nl:{id:6708,slug:'netherlands',fifa:8},tn:{id:6719,slug:'tunisia',fifa:45},nz:{id:5820,slug:'new-zealand',fifa:85},ir:{id:6711,slug:'iran',fifa:20},be:{id:8263,slug:'belgium',fifa:9},eg:{id:10255,slug:'egypt',fifa:29},uy:{id:5796,slug:'uruguay',fifa:16},sa:{id:7795,slug:'saudi-arabia',fifa:61},es:{id:6720,slug:'spain',fifa:2},cv:{id:5888,slug:'cape-verde',fifa:67},no:{id:8492,slug:'norway',fifa:31},fr:{id:6723,slug:'france',fifa:3},sn:{id:6395,slug:'senegal',fifa:15},ar:{id:6706,slug:'argentina',fifa:1},at:{id:8255,slug:'austria',fifa:24},jo:{id:5816,slug:'jordan',fifa:63},dz:{id:6317,slug:'algeria',fifa:28},co:{id:8258,slug:'colombia',fifa:13},pt:{id:8361,slug:'portugal',fifa:5},uz:{id:8700,slug:'uzbekistan',fifa:50},'gb-eng':{id:8491,slug:'england',fifa:4},gh:{id:6714,slug:'ghana',fifa:73},pa:{id:5922,slug:'panama',fifa:34},hr:{id:10155,slug:'croatia',fifa:11},se:{id:8520,slug:'sweden',fifa:38},iq:{id:5819,slug:'iraq',fifa:57},cd:{id:6321,slug:'dr-congo',fifa:46}};
  const WC='https://www.fotmob.com/leagues/77/overview/world-cup';
  const teamUrl=(name,c)=>{const x=FOTMOB[c];return (x&&x.id)?`https://www.fotmob.com/teams/${x.id}/overview/${x.slug}`:WC;};
  const fmMatch=m=>teamUrl(m.home,m.hc);
  const fifaOf=c=>(FOTMOB[c]||{}).fifa;
  const timeStr=iso=>{const hm=iso.slice(11,16).split(':');let h=+hm[0];const ap=h<12?'AM':'PM';h=h%12||12;return `${h}:${hm[1]} ${ap}`;};
  const outChip=o=>o==='1'?'ch-grn':o==='2'?'ch-red':'ch-amb';
  const outLabel=(o,h,a)=>o==='1'?('Gana '+h):o==='2'?('Gana '+a):o==='X'?'Empata':'Sin pick';

  function pickFor(pl,mid){const i=OI[mid];const v=pl.k[i]||'';if(!v)return null;const[o,s]=v.split('|');return {o,s:s||''};}

  function currentMD(){const now=Date.now();for(let i=0;i<DATA.matchdays.length;i++){const last=Math.max(...DATA.matchdays[i].matchIds.map(id=>new Date(DATA.matches[id].kick).getTime()));if(now<=last+2.5*3600*1000)return i;}return DATA.matchdays.length-1;}

  function rankRows(list,name,pts){return list.map(e=>{const me=e.name===name;const d=e.pts-pts;let b,pc;if(me){b='<span class="fr-diff bg-you">★ Tú</span>';pc='pt-me';}else if(d>0){b=`<span class="fr-diff bg-up">▲ +${d}</span>`;pc='pt-up';}else if(d===0){b='<span class="fr-diff bg-dn">= 0</span>';pc='pt-me';}else{b=`<span class="fr-diff bg-dn">▼ ${d}</span>`;pc='pt-dn';}return `<div class="fr-row${me?' me':''}" data-n="${esc(e.name)}" onclick="selName(this)"><span class="fr-pos">${e.pos}°</span><span class="fr-name">${esc(e.name)}</span>${b}<span class="fr-pts ${pc}">${e.pts}</span></div>`;}).join('');}
  function selName(el){const n=el.getAttribute('data-n');if(!n||!DATA.players[n])return;const inp=$('#search');if(inp)inp.value=n;render(n);}
  function pickSearch(q){var box=$('#pickResults');if(!box)return;var k=L_norm(q);if(!k){box.hidden=true;box.innerHTML='';return;}var names=Object.keys(DATA.players).filter(function(n){return L_norm(n).indexOf(k)>=0;});names.sort(function(a,b){return (DATA.players[a].p||999)-(DATA.players[b].p||999);});names=names.slice(0,12);if(!names.length){box.hidden=false;box.innerHTML='<div class="pr-empty">Sin resultados</div>';return;}box.innerHTML=names.map(function(n){var p=DATA.players[n];return '<div class="pr-item" data-n="'+esc(n)+'" onclick="pickPick(this)"><span class="pr-name">'+esc(n)+'</span>'+(p.p?'<span class="pr-pos">'+p.p+'°</span>':'')+'</div>';}).join('');box.hidden=false;}
  function pickPick(el){var n=el.getAttribute('data-n');var inp=$('#search');if(inp)inp.value=n;var box=$('#pickResults');if(box){box.hidden=true;box.innerHTML='';}render(n);}

  function showPicks(mid,btn){
    var panel=btn.nextElementSibling;
    if(panel.hidden===false){panel.hidden=true;btn.textContent='👥 Qué puso cada uno';return;}
    if(!panel.getAttribute('data-built')){
      var m=DATA.matches[mid],groups={};
      Object.keys(DATA.players).forEach(function(n){var pk=pickFor(DATA.players[n],mid);if(!pk||!pk.o)return;var key=pk.o+'|'+(pk.s||'');(groups[key]=groups[key]||{o:pk.o,s:pk.s,names:[]}).names.push(n);});
      var arr=Object.keys(groups).map(function(k){return groups[k];}).sort(function(a,b){return b.names.length-a.names.length;});
      var tot=arr.reduce(function(s,g){return s+g.names.length;},0);
      var html=arr.map(function(g){var lbl=g.o==='1'?('Gana '+m.home):(g.o==='2'?('Gana '+m.away):'Empate');g.names.sort(function(a,b){return a.localeCompare(b,'es');});return '<div class="mp-group"><div class="mp-gh">'+esc(lbl)+(g.s?(' · '+esc(g.s)):'')+'<span class="mp-n">'+g.names.length+'</span></div><div class="mp-names">'+g.names.map(esc).join(' · ')+'</div></div>';}).join('');
      panel.innerHTML='<div class="mp-tot">'+tot+' pronósticos · ordenados por más votado</div>'+html;
      panel.setAttribute('data-built','1');
    }
    panel.hidden=false;btn.textContent='✕ Ocultar';
  }

  function matchCard(id,pick,dlabel){
    const m=DATA.matches[id],t=m.total||0,oc=m.oc||{};
    const hp=t?Math.round((oc['1']||0)/t*100):0,dp=t?Math.round((oc['X']||0)/t*100):0,ap=t?Math.round((oc['2']||0)/t*100):0;
    const time=timeStr(m.kick),hf=fifaOf(m.hc),af=fifaOf(m.ac);
    let tuLbl,tuSub,ag,agT;
    if(pick){tuLbl=outLabel(pick.o,m.home,m.away);tuSub=pick.s||'';const ok=pick.o===m.cons;ag=ok?'':' no';agT=ok?'✓ Tú y el grupo coinciden':'✕ No coincides con el grupo';}
    else{tuLbl='Sin pick';tuSub='';ag=' no';agT='Sin pick registrado';}
    return `<div class="match">
      <div class="sb2"><div class="sb-row">
        <a class="sb-team" href="${teamUrl(m.home,m.hc)}" target="_blank" rel="noopener">${flag(m.hc)}<span class="sb-name">${esc(m.home)}</span>${hf?`<span class="sb-fifa">FIFA #${hf}</span>`:''}</a>
        <div class="sb-mid">${m.res?`<div class="sb-res">${esc(m.res.split('-').join(' – '))}</div><div class="sb-date">FINAL · ${esc(dlabel).toUpperCase()}</div>`:`<div class="sb-time">${time}</div><div class="sb-date">${esc(dlabel).toUpperCase()}</div>`}</div>
        <a class="sb-team" href="${teamUrl(m.away,m.ac)}" target="_blank" rel="noopener">${flag(m.ac)}<span class="sb-name">${esc(m.away)}</span>${af?`<span class="sb-fifa">FIFA #${af}</span>`:''}</a>
      </div><div class="sb-odds">
        <div><span class="o-pct" style="color:#3CD07A">${hp}%</span><span class="o-lbl">Gana ${esc(short(m.home))}</span></div>
        <div><span class="o-pct" style="color:#C9C9C2">${dp}%</span><span class="o-lbl">Empate</span></div>
        <div><span class="o-pct" style="color:#F0736A">${ap}%</span><span class="o-lbl">Gana ${esc(short(m.away))}</span></div>
      </div></div>
      <div class="m-meta2"><span class="m-grp">Grupo ${m.g} · ${esc(dlabel)}</span></div>
      <div class="cmp">
        <div class="cell"><span class="tag2">Tu pick</span><span class="pickv">${esc(tuLbl)}</span><span class="sub2">${tuSub?('Marcador '+esc(tuSub)):'—'}</span></div>
        <div class="cell"><span class="tag2">El grupo</span><span class="pickv">${esc(m.consLbl)}</span><span class="sub2">${m.gs?('Marcador '+esc(m.gs)):'—'}</span></div>
      </div>
      <div class="m-agree${ag}"><span>${agT}</span></div><button class="mp-btn" onclick="showPicks('${id}',this)">👥 Qué puso cada uno</button><div class="mp-panel" hidden></div></div>`;
  }

  function comboCard(c){
    const legs=c.legs.map(([mid,lbl])=>{const m=DATA.matches[mid];return `<div class="pk"><span class="pk-match">${flagS(m.hc)}<span class="pk-team">${esc(m.home.slice(0,12))} vs ${esc(m.away.slice(0,12))}</span>${flagS(m.ac)}</span><span class="pk-out">${esc(lbl)}</span></div>`;}).join('');
    return `<div class="combo combo--${c.cls}"><div class="combo-h"><span class="combo-name">${esc(c.n)}</span><span class="combo-x">≈${c.m}<small>aprox</small></span></div>${legs}<div class="combo-risk"><span class="${c.rc}">${esc(c.rl)}</span></div></div>`;
  }

  function render(name){
    const p=DATA.players[name]; if(!p){$('#app').innerHTML='';return;}
    CUR=name; VIEW='quiniela'; const _pw=$('#pickwrap'); if(_pw)_pw.style.display=''; setActive('quiniela');

  function viewPronosticos(){
    const N2C={};(DATA.teams||[]).forEach(t=>{N2C[t.name]=t.code;});DATA.order.forEach(id=>{const m=DATA.matches[id];if(!N2C[m.home])N2C[m.home]=m.hc;if(!N2C[m.away])N2C[m.away]=m.ac;});
    const agg=f=>{const base={};Object.values(DATA.players).forEach(p=>{let v=p.pred&&p.pred[f];if(v==null)return;v=String(v).trim();if(!v||v==='0')return;const k=v.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,' ').trim();if(!k)return;(base[k]||(base[k]={c:0,nm:{},toks:new Set(k.split(' '))})).c++;base[k].nm[v]=(base[k].nm[v]||0)+1;});let items=Object.values(base).sort((a,b)=>a.toks.size-b.toks.size);for(let i=0;i<items.length;i++){const a=items[i];if(!a)continue;for(let j=i+1;j<items.length;j++){const b=items[j];if(!b)continue;let sub=true;a.toks.forEach(t=>{if(!b.toks.has(t))sub=false;});if(sub){b.c+=a.c;for(const n in a.nm)b.nm[n]=(b.nm[n]||0)+a.nm[n];items[i]=null;break;}}}return items.filter(Boolean).map(o=>[Object.entries(o.nm).sort((x,y)=>y[1]-x[1])[0][0],o.c]).sort((x,y)=>y[1]-x[1]);};
    const bars=(arr,fl)=>{if(!arr.length)return '<div class="note">Sin datos.</div>';const tot=arr.reduce((s,x)=>s+x[1],0),mx=arr[0][1];return arr.slice(0,8).map(([n,c],i)=>{const w=Math.round(c/mx*100),pc=Math.round(c/tot*100),f=fl&&N2C[n]?flagR(N2C[n])+' ':'';return `<div class="pg-row"><span class="pg-rk">${i+1}</span><div class="pg-main"><div class="pg-name">${f}${esc(n)}</div><div class="pg-track"><div class="pg-bar" style="width:${Math.max(6,w)}%"></div></div></div><div class="pg-meta"><span class="pg-pc">${pc}%</span><span class="pg-c">${c} voto${c===1?'':'s'}</span></div></div>`;}).join('');};
    const champ=agg('champion'),runner=agg('runnerup'),third=agg('third'),boot=agg('boot_gold'),ball=agg('ball_gold');
    const champTot=champ.reduce((s,x)=>s+x[1],0);

    const d0=sp[0],c0=sp[sp.length-1];
    const emp=ms.filter(m=>m.cons==='X').length;
    const gg=s=>{const p=String(s).split('-');return (+p[0]||0)+(+p[1]||0);};
    const gol=ms.filter(m=>m.gs).slice().sort((a,b)=>gg(b.gs)-gg(a.gs))[0];
    const scC={};ms.forEach(m=>{if(m.gs)scC[m.gs]=(scC[m.gs]||0)+1;});const scTop=Object.entries(scC).sort((a,b)=>b[1]-a[1])[0];
    const fn=arr=>arr&&arr[0]?((N2C[arr[0][0]]?flagR(N2C[arr[0][0]])+' ':'')+esc(arr[0][0])):'—';
    const mvs=m=>flagR(m.hc)+' '+esc(short(m.home))+' vs '+esc(short(m.away))+' '+flagR(m.ac);
    const card=(k,v,s)=>`<div class="pg-card"><div class="pg-k">${k}</div><div class="pg-v">${v}</div>${s?`<div class="pg-s">${s}</div>`:''}</div>`;
    const cur=`<div class="pg-cards2">`+
      card('🏆 Campeón favorito',fn(champ),champ[0]?Math.round(champ[0][1]/champTot*100)+'% de los votos':'')+
      card('🥈 Subcampeón favorito',fn(runner),runner[0]?runner[0][1]+' votos':'')+
      card('🥉 3er puesto favorito',fn(third),third[0]?third[0][1]+' votos':'')+
      card('👟 Bota de Oro favorita',boot[0]?esc(boot[0][0]):'—',boot[0]?boot[0][1]+' votos':'')+
      card('⭐ Balón de Oro favorito',ball[0]?esc(ball[0][0]):'—',ball[0]?ball[0][1]+' votos':'')+

    `</div>`;

      `</section>`+
      `<section class="card span2"><div class="st"><span class="cbar" style="background:var(--blu)"></span>Puntos por fase</div><table class="rgt"><thead><tr><th>Fase</th><th>Signo</th><th>Diferencia</th><th>Exacto</th></tr></thead><tbody>${rows}</tbody></table><div class="note">A medida que avanza el torneo, cada acierto vale más.</div></section>`+
      `<section class="card span2"><div class="st"><span class="cbar" style="background:var(--yel)"></span>Predicciones del torneo</div><div class="rg-cards"><div class="rg-card"><div class="rg-pts">15</div><div class="rg-k">Campeón</div></div><div class="rg-card"><div class="rg-pts">10</div><div class="rg-k">Subcampeón</div></div><div class="rg-card"><div class="rg-pts">8</div><div class="rg-k">Bota de Oro</div><div class="rg-d">Máximo goleador</div></div></div><div class="rg-extra"><div class="rg-pill">🎯 También se predice la <strong>posición exacta</strong> de cada equipo en su grupo (1º a 4º): <strong>+2</strong> por acierto.</div><div class="rg-pill">🧩 En <strong>eliminatorias</strong> también predices qué equipos avanzan en cada ronda (16avos, octavos…): suma puntos por acierto.</div><div class="rg-pill">ℹ️ Bota de Plata/Bronce y Balón de Oro/Plata/Bronce: se registran sin puntos.</div><div class="rg-pill">📐 El "% de ajuste por desvío" en diferencia de goles <strong>no aplica</strong>.</div></div></section>`+
      `<section class="card span2"><div class="st"><span class="cbar" style="background:var(--pur)"></span>Reglas completas (texto)</div><button class="rg-toggle" onclick="var t=document.getElementById('rg-full');t.hidden=!t.hidden;this.textContent=t.hidden?'Mostrar todo el texto ▾':'Ocultar texto ▴';">Mostrar todo el texto ▾</button><div id="rg-full" class="rg-full" hidden>${txt}</div></section>`+
    `</div>`;
  }

  function viewRanking(){
    var st=DATA.standings||[],med=['🥇','🥈','🥉'];
    var podium='<div class="rkp">'+st.slice(0,3).map(function(e,i){return '<div class="rkp-c rkp-'+(i+1)+'" data-n="'+esc(e.name)+'" onclick="selName(this)"><div class="rkp-m">'+med[i]+'</div><div class="rkp-pos">'+e.pos+'°</div><div class="rkp-name">'+esc(e.name)+'</div><div class="rkp-pts">'+e.pts+'</div></div>';}).join('')+'</div>';
    var rows=st.map(function(e){var me=CUR&&e.name===CUR;return '<div class="rk-row'+(me?' me':'')+'" data-n="'+esc(e.name)+'" onclick="selName(this)"><span class="rk-pos">'+e.pos+'°</span><span class="rk-name">'+esc(e.name)+'</span><span class="rk-pts">'+e.pts+'</span></div>';}).join('');
    return '<div class="grid"><section class="card span2"><div class="st"><span class="cbar" style="background:var(--yel)"></span>Ranking general'+(DATA.live?' <span class="livebadge">🔴 EN VIVO</span>':'')+'<span class="smeta">'+st.length+' PARTICIPANTES</span></div>'+podium+'<input class="rk-search" id="rkSearch" placeholder="🔎 Busca tu nombre…" autocomplete="off" oninput="rkFilter(this.value)"><div class="rk-list" id="rkList">'+rows+'</div><div class="note">Toca a cualquiera para ver su quiniela. Si ya te buscaste, sales resaltado en amarillo.</div></section></div>';
  }
  function rkFilter(q){q=L_norm(q);var rows=document.querySelectorAll('#rkList .rk-row');for(var i=0;i<rows.length;i++){var n=L_norm(rows[i].getAttribute('data-n'));rows[i].style.display=(!q||n.indexOf(q)>=0)?'':'none';}}

  function viewMundial(){
    return `<div class="grid"><section class="card span2"><div class="st"><span class="cbar" style="background:var(--red)"></span>Mundial en vivo</div><div class="mv-soon"><div class="mv-emoji">⚽</div><div class="mv-t">Pronto</div><div class="mv-d">Goleadores, asistencias y tablas reales de cada grupo — se activan cuando publiquemos el sitio online. Mientras tanto explora <strong>Pronósticos del grupo</strong> y <strong>Partidos</strong>.</div><button class="mv-btn" onclick="setView('pronosticos')">Ver Pronósticos del grupo</button></div></section></div>`;
  }

  // ===== LIVE: resultados reales de ESPN + recálculo en el navegador (sin servidor) =====
  var FIFA3={MEX:'mx',RSA:'za',KOR:'kr',CZE:'cz',SUI:'ch',BIH:'ba',CAN:'ca',QAT:'qa',USA:'us',PAR:'py',BRA:'br',MAR:'ma',HAI:'ht',SCO:'gb-sct',AUS:'au',TUR:'tr',GER:'de',CUW:'cw',NED:'nl',JPN:'jp',CIV:'ci',ECU:'ec',SWE:'se',TUN:'tn',ESP:'es',CPV:'cv',BEL:'be',EGY:'eg',KSA:'sa',URU:'uy',IRN:'ir',NZL:'nz',FRA:'fr',SEN:'sn',IRQ:'iq',NOR:'no',ARG:'ar',ALG:'dz',AUT:'at',JOR:'jo',POR:'pt',COD:'cd',ENG:'gb-eng',CRO:'hr',GHA:'gh',PAN:'pa',UZB:'uz',COL:'co'};
  function L_ps(s){var m=/^\s*(\d+)\s*-\s*(\d+)\s*$/.exec(s||'');return m?[+m[1],+m[2]]:null;}
  function L_o(h,a){return h>a?'1':(h<a?'2':'X');}
  function L_stage(code){var c=String(code||'').toUpperCase();if(/^[A-L]\d/.test(c))return{s:1,d:1,e:2};if(/16|R32/.test(c))return{s:2,d:2,e:2};if(/OCT|R16/.test(c))return{s:3,d:3,e:3};if(/CUART|QF/.test(c))return{s:4,d:4,e:4};if(/SEMI|SF/.test(c))return{s:5,d:5,e:5};if(/FINAL/.test(c))return{s:8,d:8,e:8};return{s:1,d:1,e:2};}
  function L_p(pick,score,st){if(!pick||pick.indexOf('|')<0)return 0;var p=pick.split('|'),po=p[0].trim(),pr=L_ps(p[1]),rr=L_ps(score);if(!rr)return 0;var ro=L_o(rr[0],rr[1]),v=0;if(po===ro)v+=st.s;if(pr&&po===ro&&(pr[0]-pr[1])===(rr[0]-rr[1]))v+=st.d;if(pr&&pr[0]===rr[0]&&pr[1]===rr[1])v+=st.e;return v;}
  function L_espn(j){var out=[];((j&&j.events)||[]).forEach(function(e){var c=e.competitions&&e.competitions[0];if(!c)return;var cs=c.competitors||[],h=cs.filter(function(x){return x.homeAway==='home';})[0],a=cs.filter(function(x){return x.homeAway==='away';})[0];if(!h||!a)return;var st=(e.status&&e.status.type)||{};out.push({hc:String(h.team.abbreviation||'').toUpperCase(),ac:String(a.team.abbreviation||'').toUpperCase(),hs:parseInt(h.score,10),as:parseInt(a.score,10),completed:!!st.completed});});return out;}
  function L_results(ev,pf){var bp={};pf.matches.forEach(function(m){if(!/^[A-L]\d/.test(String(m.code||'')))return;if(m.hc&&m.ac&&m.hc!=='un'&&m.ac!=='un')bp[[m.hc,m.ac].sort().join('|')]=m;});var rm={},lv={};ev.forEach(function(e){var hi=FIFA3[e.hc],ai=FIFA3[e.ac];if(!hi||!ai||isNaN(e.hs)||isNaN(e.as))return;var m=bp[[hi,ai].sort().join('|')];if(!m)return;var hs=e.hs,as=e.as;if(m.hc===ai){hs=e.as;as=e.hs;}var sc=hs+'-'+as,mid=m.group+'_J'+String(m.code).slice(1)+'_'+m.hc+'_'+m.ac;if(e.completed)rm[m.home+'|'+m.away]=sc;lv[mid]={score:sc,completed:e.completed};});return{rm:rm,lv:lv};}
  var L_norm=function(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]/g,'');};
  var L_toks=function(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,' ').trim().split(' ').filter(Boolean);};
  async function goLive(){
    var pf,espn;
    try{var rr=await Promise.all([fetch('picks_frozen.json?v='+Date.now()).then(function(r){return r.json();}),fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260720').then(function(r){return r.json();})]);pf=rr[0];espn=rr[1];}catch(e){return;}
    if(!pf||!pf.matches||!espn)return;
    var rb=L_results(L_espn(espn),pf);
    if(!Object.keys(rb.rm).length)return;
    var tot={};pf.players.forEach(function(n){tot[n]=0;});
    pf.matches.forEach(function(m,i){var sc=rb.rm[m.home+'|'+m.away];if(!sc)return;var st=L_stage(m.code);pf.players.forEach(function(n){var a=pf.picks[n];if(a)tot[n]+=L_p(a[i],sc,st);});});
    var fz=Object.keys(tot).map(function(n){return {pts:tot[n],nk:L_norm(n),tk:L_toks(n)};});
    var fzExact={};fz.forEach(function(f){fzExact[f.nk]=f.pts;});
    var ALIAS={dannyhuertas:'danielhuertas',hermanitosaponte:'hemanitosaponte',juandiegohillinger:'juandhillinger',luisfernandoespejo:'luisespejo',michaelhagos:'mikehagos',pabloduna:'pablodunia',santiagohuertas:'santihuertas',camilamedina:'camilaolses'};
    function livePts(name){var nk=L_norm(name);if(fzExact[nk]!=null)return fzExact[nk];if(ALIAS[nk]!=null&&fzExact[ALIAS[nk]]!=null)return fzExact[ALIAS[nk]];var dt=L_toks(name),best=null,bs=Infinity;for(var i=0;i<fz.length;i++){var ft=fz[i].tk,dF=dt.every(function(x){return ft.indexOf(x)>=0;}),fD=ft.every(function(x){return dt.indexOf(x)>=0;}),sc=dF?(ft.length-dt.length):(fD?(100+dt.length-ft.length):Infinity);if(sc<bs){bs=sc;best=fz[i];}}return (best&&bs<Infinity)?best.pts:null;}
    if(!DATA._baseline){DATA._baseline={};DATA.standings.forEach(function(e){DATA._baseline[L_norm(e.name)]=e.pts;});}
    var prevN=DATA._baseline;
    var names=Object.keys(DATA.players);
    var st=names.map(function(n){var p=livePts(n);return {name:n,pts:(p!=null?p:(DATA.players[n].t||0))};});
    st.sort(function(a,b){return b.pts-a.pts||a.name.localeCompare(b.name,'es');});
    var last=null,lp=0;st.forEach(function(e,i){if(e.pts===last)e.pos=lp;else{e.pos=i+1;last=e.pts;lp=i+1;}e.delta=e.pts-(prevN[L_norm(e.name)]||0);});
    DATA.standings=st;DATA.total=st.length;DATA.leaderName=st[0].name;DATA.leaderPts=st[0].pts;
    var byN={};st.forEach(function(e){byN[L_norm(e.name)]=e;});
    names.forEach(function(n){var e=byN[L_norm(n)];if(e){DATA.players[n].p=e.pos;DATA.players[n].t=e.pts;DATA.players[n].delta=e.delta;}});
    var cc={};st.forEach(function(e){cc[e.pts]=(cc[e.pts]||0)+1;});
    DATA.dist=Object.keys(cc).map(Number).sort(function(a,b){return b-a;}).slice(0,8).map(function(p){return [p,cc[p]];});
    Object.keys(rb.lv).forEach(function(mid){if(DATA.matches[mid]&&rb.lv[mid].completed)DATA.matches[mid].res=rb.lv[mid].score;});
    DATA.live=true;DATA.liveCount=Object.keys(rb.rm).length;
    if(VIEW==='quiniela'&&CUR)render(CUR);else if(VIEW!=='quiniela')setView(VIEW);
  }

  function boot(d){
    DATA=d; OI={}; d.order.forEach((mi,i)=>OI[mi]=i);
    if(d.css){$('#rcss').textContent=d.css; const ec=$('#extcss'); if(ec) ec.remove();}
    if(d.logo){LOGO='data:image/png;base64,'+d.logo;}
    const gen=new Date(d.gen);
    $('#ftgen').textContent='Generado por Saúl Bretto · datos al '+gen.toLocaleDateString('es',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const names=Object.keys(d.players);
    $('#hint').textContent=`${names.length} participantes · escribe tu nombre`;
    const inp=$('#search');
    inp.addEventListener('input',function(){pickSearch(inp.value);});
    inp.addEventListener('keydown',function(e){if(e.key==='Enter'){const f=document.querySelector('#pickResults .pr-item');if(f)pickPick(f);}});
    (document.querySelectorAll?document.querySelectorAll('.tab'):[]).forEach(b=>b.addEventListener('click',()=>setView(b.getAttribute('data-v'))));
    let last='';try{last=localStorage.getItem('q26name')||'';}catch(e){}
    if(last&&d.players[last]){inp.value=last;render(last);}
    goLive();
  }
  if(window.__DATA__){boot(window.__DATA__);}
  else{fetch('data.json?v='+Date.now()).then(r=>r.json()).then(boot).catch(e=>{$('#hint').textContent='Error cargando datos. Recarga la página.';});}
  </script>
